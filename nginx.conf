server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # The app has no client-side router (single page, tab state lives in React), so this fallback
    # is just a safety net rather than a real SPA-routing requirement.
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
}
